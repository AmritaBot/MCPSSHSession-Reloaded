services:
  mcp-ssh-reloaded:
    build: .
    image: mcp-ssh-reloaded:latest
    stdin_open: true
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount SSH keys (recommended)
      - ~/.ssh:/mounts/ssh-keys:ro

      # Mount SSH config (optional)
      # - ~/.ssh/config:/mounts/ssh-config/config:ro

      # Mount logs for persistence (optional)
      # - ./logs:/tmp/mcp_ssh_session_logs