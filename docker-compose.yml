services:
  mcp-ssh-reloaded:
    build: .
    image: mcp-ssh-reloaded:latest
    stdin_open: true
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # Server configuration (see README.md#configuration for all options)
      # - MCP_SSH_DEFAULT_TIMEOUT=60
      # - MCP_SSH_MAX_WORKERS=20
      # - MCP_SSH_INTERACTIVE_MODE=true
      # - MCP_SSH_LOG_DIR=/tmp/mcp_ssh_session_logs
    volumes:
      # Mount SSH keys (recommended)
      - ~/.ssh:/mounts/ssh-keys:ro

      # Mount SSH config (optional)
      # - ~/.ssh/config:/mounts/ssh-config/config:ro

      # Mount logs for persistence (optional)
      # - ./logs:/tmp/mcp_ssh_session_logs